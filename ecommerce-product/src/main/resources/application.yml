server:
  port: 8082
spring:
  application:
    name: product-service
  datasource:
    url: "jdbc:mysql://localhost:3306/ecommerce?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
knife4j:
  enable: true
  setting:
    language: zh_cn
jwt:
  secret: ecommerce-platform-2025-secret-key-for-jwt-min-256-bits-length!!
  expiration: 86400000
app:
  upload:
    dir: uploads